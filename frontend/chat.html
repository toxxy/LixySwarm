<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LixySwarm — Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 1.4rem; font-weight: 700; color: #4CAF50; }
    header .subtitle { font-size: 0.8rem; color: #666; }
    header .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #4CAF50;
    }
    header .status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4CAF50;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .message.user {
      background: #1a3a1a;
      border: 1px solid #2a5a2a;
      align-self: flex-end;
      color: #c8e6c9;
    }
    .message.swarm {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      align-self: flex-start;
      color: #e0e0e0;
    }
    .message .meta {
      font-size: 0.7rem;
      color: #555;
      margin-top: 6px;
    }
    .message.swarm .meta { color: #4CAF50; opacity: 0.7; }
    .swarm-tag {
      font-size: 0.72rem;
      color: #4CAF50;
      margin-bottom: 4px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .input-area {
      background: #111;
      border-top: 1px solid #1e1e1e;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
    }
    .input-area input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #4CAF50; }
    .input-area button {
      background: #4CAF50;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .input-area button:hover { background: #66BB6A; }
    .empty-state {
      text-align: center;
      margin: auto;
      color: #333;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="logo">🐜 LixySwarm</div>
      <div class="subtitle">Enjambre distribuido de inteligencia</div>
    </div>
    <div class="status">
      <div class="dot"></div>
      Conectado
    </div>
  </header>

  <div class="chat-container" id="chat">
    <div class="empty-state">
      <div class="icon">🐜🐘🐬</div>
      <p>El enjambre está listo.<br/>Escribe algo para comenzar.</p>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Escribe tu mensaje..." onkeydown="if(event.key==='Enter') sendMsg()" />
    <button onclick="sendMsg()">Enviar</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('msg-input');

    function sendMsg() {
      const text = input.value.trim();
      if (!text) return;

      // Limpiar estado vacío
      const empty = chat.querySelector('.empty-state');
      if (empty) empty.remove();

      // Mensaje del usuario
      addMessage(text, 'user');
      input.value = '';

      // Simular respuesta del enjambre (placeholder hasta tener backend)
      setTimeout(() => {
        addMessage('Backend del enjambre próximamente... 🐜', 'swarm', 'Agente 1 · explorador');
      }, 800);
    }

    function addMessage(text, type, agent = '') {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      if (agent) div.innerHTML = `<div class="swarm-tag">🐜 ${agent}</div>`;
      div.innerHTML += `${text}<div class="meta">${new Date().toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'})}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
