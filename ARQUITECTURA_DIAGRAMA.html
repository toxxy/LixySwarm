<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lixy-0.1 — Arquitectura Bio-Inspirada</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc; --fg: #172033; --muted: #5b6475; --line: #64748b;
    --neutral: #e2e8f0; --input: #bfdbfe; --process: #c7d2fe;
    --storage: #99f6e4; --external: #fde68a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e5e7eb; --muted: #a3adbd; --line: #94a3b8;
      --neutral: #334155; --input: #1d4ed8; --process: #4338ca;
      --storage: #0f766e; --external: #92400e;
    }
  }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.4 ui-sans-serif,system-ui,sans-serif; }
  main { max-width:980px; margin:32px auto; padding:0 20px; }
  svg  { width:100%; height:auto; display:block; }
  .title   { font-size:19px; font-weight:700; fill:var(--fg); }
  .label   { font-size:13px; font-weight:600; fill:var(--fg); }
  .small   { font-size:11px; fill:var(--muted); }
  .tiny    { font-size:10px; fill:var(--muted); }
  .node    { stroke:var(--line); stroke-width:1.2; }
  .neutral { fill:var(--neutral); }
  .input   { fill:var(--input); }
  .process { fill:var(--process); }
  .storage { fill:var(--storage); }
  .external{ fill:var(--external); }
  .edge    { stroke:var(--line); stroke-width:1.5; fill:none; }
  .feromon { stroke:#f97316; stroke-width:1.4; fill:none; stroke-dasharray:5 3; }
  .infra   { stroke:#d97706; stroke-width:2.2; fill:none; }
  .zone    { fill:none; stroke:var(--line); stroke-width:1; stroke-dasharray:6 5; opacity:.65; }
  .zlabel  { font-size:12px; font-weight:600; fill:var(--muted); }
</style>
<main>
<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
<defs>

  <marker id="ai" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#d97706"/></marker>
</defs>

<!-- ══ CONNECTORS (drawn before nodes) ══ -->

<!-- Input → fanout point inside Delfín zone -->

<path d="M450,112 C450,128 135,120 135,138" class="edge" marker-end="url(#a)"/>

<path d="M450,112 C450,128 565,120 565,138" class="edge" marker-end="url(#a)"/>

<path d="M135,184 C135,200 350,195 350,208" class="edge"/>
<line x1="350" y1="184" x2="350" y2="208" class="edge"/>
<path d="M565,184 C565,200 350,195 350,208" class="edge"/>

<!-- Embed → Hormiga zone (routes to center) -->
<path d="M350,246 C350,268 450,260 450,285" class="edge" marker-end="url(#a)"/>

<path d="M422,360 C422,385 350,385 350,408" class="feromon" marker-end="url(#af)"/>
<path d="M570,360 C570,385 540,385 540,408" class="feromon" marker-end="url(#af)"/>

<!-- Generación → Output -->
<path d="M540,456 L540,476 L450,476 L450,515" class="edge" marker-end="url(#a)"/>

<line x1="688" y1="426" x2="658" y2="426" class="infra" marker-end="url(#ai)"/>
